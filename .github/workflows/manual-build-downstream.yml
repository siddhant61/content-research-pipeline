name: Build Downstream Handoff

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      upstream_artifact_name:
        description: >
          Name of the upstream handoff artifact to download from the current
          orchestration run. When empty, the workflow falls back to the
          committed local fixtures in integration_fixtures/jwst/upstream/.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build-downstream:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        repository: siddhant61/content-research-pipeline

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install minimum dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic==2.5.0 pydantic-settings==2.1.0 click==8.1.7 loguru==0.7.2

    # ── Debug: print artifact transport inputs ────────────────────
    - name: Debug artifact transport inputs
      run: |
        echo "::group::Artifact Transport Debug"
        echo "upstream_artifact_name received: '${{ inputs.upstream_artifact_name }}'"
        ARTIFACT_DIR="/tmp/upstream-handoff"
        FIXTURE_DIR="integration_fixtures/jwst/upstream/"
        if [ -n "${{ inputs.upstream_artifact_name }}" ]; then
          echo "→ Artifact mode: will attempt to download '${{ inputs.upstream_artifact_name }}'"
          echo "→ Download target directory: ${ARTIFACT_DIR}"
        else
          echo "→ Fixture mode: no upstream_artifact_name provided"
          echo "→ Fallback directory: ${FIXTURE_DIR}"
        fi
        echo "::endgroup::"

    # ── Artifact-download mode (orchestration) ──────────────────────
    - name: Download upstream artifact
      id: download-artifact
      if: inputs.upstream_artifact_name != ''
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.upstream_artifact_name }}
        path: /tmp/upstream-handoff

    # ── Debug: inspect downloaded artifact layout ──────────────────
    - name: Debug downloaded artifact layout
      if: inputs.upstream_artifact_name != ''
      run: |
        echo "::group::Downloaded Artifact Layout"
        echo "upstream_artifact_name: '${{ inputs.upstream_artifact_name }}'"
        echo "Download step outcome: '${{ steps.download-artifact.outcome }}'"
        echo "Download directory: /tmp/upstream-handoff"
        echo "--- ls -R /tmp/upstream-handoff ---"
        ls -R /tmp/upstream-handoff || echo "(directory does not exist)"
        echo "::endgroup::"

    # ── Resolve upstream directory + generate (single step) ──────────
    - name: Resolve upstream and generate downstream handoff
      id: resolve_and_generate
      run: |
        ARTIFACT_DIR="/tmp/upstream-handoff"
        FIXTURE_DIR="integration_fixtures/jwst/upstream/"
        OUTPUT_DIR="integration_fixtures/jwst/downstream/"
        echo "Fallback fixture path: ${FIXTURE_DIR}"

        # ── Artifact mode ──────────────────────────────────────────
        if [ -n "${{ inputs.upstream_artifact_name }}" ]; then
          echo "Artifact download path: ${ARTIFACT_DIR}"
          echo "Download step outcome: '${{ steps.download-artifact.outcome }}'"

          # Verify artifact download succeeded
          if [ "${{ steps.download-artifact.outcome }}" != "success" ]; then
            echo "::error ::Artifact download FAILED for '${{ inputs.upstream_artifact_name }}'. The upstream job may not have produced this artifact, or the artifact name may be misspelled."
            exit 1
          fi
          if [ ! -d "${ARTIFACT_DIR}" ]; then
            echo "::error ::Download directory ${ARTIFACT_DIR} does not exist despite successful download step."
            exit 1
          fi

          RESOLVED_DIR=""

          # Check 1: handoff_manifest.json directly in download root
          if [ -f "${ARTIFACT_DIR}/handoff_manifest.json" ]; then
            echo "✓ handoff_manifest.json found directly in ${ARTIFACT_DIR}"
            RESOLVED_DIR="${ARTIFACT_DIR}"
          else
            echo "handoff_manifest.json not found directly in ${ARTIFACT_DIR}"
            echo "Checking for nested subdirectory layout..."
            # Check 2: exactly one child directory containing handoff_manifest.json
            CANDIDATES=""
            CANDIDATE_COUNT=0
            for child in "${ARTIFACT_DIR}"/*/; do
              [ -d "${child}" ] || continue
              if [ -f "${child}handoff_manifest.json" ]; then
                CANDIDATES="${child%/}"
                CANDIDATE_COUNT=$((CANDIDATE_COUNT + 1))
              fi
            done
            if [ "${CANDIDATE_COUNT}" -eq 1 ]; then
              RESOLVED_DIR="${CANDIDATES}"
              echo "✓ handoff_manifest.json found in nested directory: ${RESOLVED_DIR}"
            elif [ "${CANDIDATE_COUNT}" -gt 1 ]; then
              echo "::error ::Multiple nested directories contain handoff_manifest.json. Cannot resolve unique handoff package."
              echo "Directory tree:"
              ls -R "${ARTIFACT_DIR}"
              exit 1
            else
              echo "::error ::handoff_manifest.json NOT found in downloaded artifact '${{ inputs.upstream_artifact_name }}' (checked root and all child directories)."
              echo "Directory tree:"
              ls -R "${ARTIFACT_DIR}"
              exit 1
            fi
          fi

          echo "mode=artifact" >> "$GITHUB_OUTPUT"
          echo "upstream_dir=${RESOLVED_DIR}" >> "$GITHUB_OUTPUT"
          echo "::notice ::Using downloaded upstream artifact '${RESOLVED_DIR}'"
          python -c "
        import json, pathlib
        m = json.loads(pathlib.Path('${RESOLVED_DIR}/handoff_manifest.json').read_text())
        print(f'Upstream source_run_id: {m.get(\"source_run_id\", \"unknown\")}')
        "

          echo "--- Resolved directory tree ---"
          ls -R "${RESOLVED_DIR}"

          # ── Extract upstream source_run_id from handoff_manifest ───
          UPSTREAM_RUN_ID=""
          if [ -f "${RESOLVED_DIR}/handoff_manifest.json" ]; then
            UPSTREAM_RUN_ID=$(python -c "
          import json, pathlib, sys
          try:
              m = json.loads(pathlib.Path('${RESOLVED_DIR}/handoff_manifest.json').read_text())
              print(m.get('source_run_id', ''))
          except Exception as e:
              print(f'Warning: failed to parse handoff_manifest.json: {e}', file=sys.stderr)
              print('')
          ")
          fi

          # ── Debug: show explicit artifact files being used ─────────
          echo "::group::Explicit artifact file inputs"
          echo "  --manifest  : ${RESOLVED_DIR}/RawSourceBundle.json"
          echo "  --documents : ${RESOLVED_DIR}/NormalizedDocumentSet.json"
          echo "  --graph     : ${RESOLVED_DIR}/KnowledgeGraphPackage.json"
          echo "  --output-dir: ${OUTPUT_DIR}"
          echo "  --upstream-source-run-id: ${UPSTREAM_RUN_ID:-<not set>}"
          echo "::endgroup::"

          # Run CLI with explicit artifact files (bypasses --upstream-handoff-dir loader)
          rm -rf "${OUTPUT_DIR}"/*

          CLI_ARGS=(generate)
          [ -f "${RESOLVED_DIR}/RawSourceBundle.json" ] && \
            CLI_ARGS+=(--manifest "${RESOLVED_DIR}/RawSourceBundle.json")
          [ -f "${RESOLVED_DIR}/NormalizedDocumentSet.json" ] && \
            CLI_ARGS+=(--documents "${RESOLVED_DIR}/NormalizedDocumentSet.json")
          [ -f "${RESOLVED_DIR}/KnowledgeGraphPackage.json" ] && \
            CLI_ARGS+=(--graph "${RESOLVED_DIR}/KnowledgeGraphPackage.json")
          [ -n "${UPSTREAM_RUN_ID}" ] && \
            CLI_ARGS+=(--upstream-source-run-id "${UPSTREAM_RUN_ID}")
          CLI_ARGS+=(--output-dir "${OUTPUT_DIR}" --emit-handoff-manifest)

          echo "Running: PYTHONPATH=src python -m content_research_pipeline.brief_cli ${CLI_ARGS[*]}"
          PYTHONPATH=src python -m content_research_pipeline.brief_cli "${CLI_ARGS[@]}"

        # ── Fixture fallback mode ──────────────────────────────────
        else
          echo "Artifact download path: (none)"
          echo "mode=fixture" >> "$GITHUB_OUTPUT"
          echo "upstream_dir=${FIXTURE_DIR}" >> "$GITHUB_OUTPUT"
          echo "::notice ::Using committed local fixtures (${FIXTURE_DIR})"

          rm -rf "${OUTPUT_DIR}"/*
          PYTHONPATH=src python -m content_research_pipeline.brief_cli generate \
              --upstream-handoff-dir "${FIXTURE_DIR}" \
              --output-dir "${OUTPUT_DIR}" \
              --emit-handoff-manifest
        fi

    - name: Validate outputs
      run: |
        BRIEF=$(ls integration_fixtures/jwst/downstream/*ResearchBrief*.json)
        MANIFEST=$(ls integration_fixtures/jwst/downstream/*RunManifest*.json)
        PYTHONPATH=src python -m content_research_pipeline.brief_cli validate \
            --brief "$BRIEF"
        PYTHONPATH=src python -m content_research_pipeline.brief_cli validate \
            --run-manifest "$MANIFEST"

    - name: Report handoff mode
      run: |
        echo "## Downstream Handoff Build" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Mode:** ${{ steps.resolve_and_generate.outputs.mode }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Upstream dir:** ${{ steps.resolve_and_generate.outputs.upstream_dir }}" >> "$GITHUB_STEP_SUMMARY"

    - name: Upload downstream handoff artifact
      uses: actions/upload-artifact@v4
      with:
        name: jwst-downstream-handoff
        path: integration_fixtures/jwst/downstream/
